<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Entrenamiento Perro Reactivo</title>
<meta name="theme-color" content="#1f2937">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
  <header class="topbar">
    <div>
      <h1>Entrenamiento perro reactivo</h1>
      <div id="dayLabel" class="sub"></div>
    </div>
  </header>

  <section class="card">
    <div class="timer-row">
      <div>
        <div class="section-title">Temporizador</div>
        <div id="timer" class="timer">10:00</div>
      </div>
      <div class="timer-actions">
        <button id="startBtn" type="button">Start</button>
        <button id="pauseBtn" class="ghost" type="button">Pause</button>
        <button id="resetBtn" class="ghost" type="button">Reset</button>
      </div>
    </div>
  </section>

  <section class="card">
    <button id="togglePlanBtn" class="section-toggle" type="button">
      <span>Qué hacer hoy</span>
      <span id="toggleArrow">▼</span>
    </button>
    <div id="planContent">
      <div id="goal" class="goal"></div>
      <div class="step"><span class="minute">0–2 min</span><div id="warmup"></div></div>
      <div class="step"><span class="minute">2–6 min</span><div id="main"></div></div>
      <div class="step"><span class="minute">6–8 min</span><div id="easy"></div></div>
      <div class="step"><span class="minute">8–10 min</span><div id="close"></div></div>
      <div class="note-title">Si falla</div>
      <div id="failure" class="note"></div>
      <div class="note-title">Material</div>
      <div id="materials" class="note"></div>
    </div>
  </section>

  <section class="card">
    <div class="section-title">Evaluación del día</div>
    <div id="evalGrid"></div>
  </section>

  <section class="card">
    <div class="section-title">Recomendación para mañana</div>
    <div id="recommendation" class="recommendation">Completa la evaluación para ver la recomendación.</div>
  </section>
</div>
<script src="app.js"></script>
</body>
</html>
