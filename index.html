
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrenador PRO</title>
<link rel="manifest" href="manifest.json">
<style>
body{font-family:sans-serif;padding:15px;max-width:520px;margin:auto}
button{margin:3px;padding:8px;border-radius:10px}
.card{border:1px solid #ccc;padding:12px;border-radius:14px;margin-top:12px}
h2{margin-bottom:5px}
.small{font-size:12px;color:#555}
</style>
</head>
<body>

<h2>🐶 Entrenador PRO</h2>
<div id="day"></div>

<div class="card">
<h3>⏱ Temporizador</h3>
<div id="timer">10:00</div>
<button onclick="start()">Start</button>
<button onclick="pause()">Pause</button>
<button onclick="reset()">Reset</button>
</div>

<div class="card">
<h3>📋 Plan detallado</h3>
<div id="plan"></div>
</div>

<div class="card">
<h3>🚨 Acción rápida</h3>
<button onclick="action('calm')">Tranquilo</button>
<button onclick="action('tense')">Tenso</button>
<button onclick="action('react')">Reacciona</button>
<div id="advice"></div>
</div>

<div class="card">
<h3>📊 Evaluación</h3>
<div id="eval"></div>
</div>

<div class="card">
<h3>📈 Progreso</h3>
<canvas id="chart" width="300" height="150"></canvas>
</div>

<script src="app.js"></script>
</body>
</html>
